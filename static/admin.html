<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wechik - 관리자 페이지</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10B981;
            --primary-hover: #059669;
            --bg: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --danger: #EF4444;
            --info: #3B82F6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 30px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 15px; }
        .header h1 { font-size: 24px; font-weight: 600; }
        
        .header-actions { display: flex; align-items: center; gap: 15px; }
        .input-group { display: flex; align-items: center; gap: 10px; background: #F9FAFB; padding: 5px 15px; border-radius: 8px; border: 1px solid var(--border); }
        .input-group label { font-size: 14px; font-weight: 600; color: var(--text-muted); }
        .input-group input { border: none; background: transparent; font-size: 15px; outline: none; width: 150px; font-weight: 500;}
        
        .btn-export { padding: 12px 24px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn-export:hover { background: var(--primary-hover); }
        .btn-export:disabled { background: #9CA3AF; cursor: not-allowed; }
        .content { padding: 0 30px 30px; overflow-x: auto; }
        
        .tabs { display: flex; border-bottom: 1px solid var(--border); background: #F9FAFB; }
        .tab-btn { flex: 1; padding: 15px; background: none; border: none; font-size: 15px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: 0.2s; }
        .tab-btn:hover { color: var(--primary); }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); background: white; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 800px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #F9FAFB; font-weight: 600; color: var(--text-muted); font-size: 14px; }
        td { font-size: 15px; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; background: #FEF3C7; color: #D97706; }
        
        .btn-sm { padding: 6px 12px; border-radius: 6px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-edit { background: #DBEAFE; color: #1D4ED8; margin-right: 5px; }
        .btn-edit:hover { background: #BFDBFE; }
        .btn-delete { background: #FEE2E2; color: #B91C1C; }
        .btn-delete:hover { background: #FECACA; }
        
        .empty-state { text-align: center; padding: 50px 0; color: var(--text-muted); }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(3px); }
        .modal-content { background: white; padding: 30px; border-radius: 16px; width: 90%; max-width: 500px; }
        .modal-header { font-size: 20px; font-weight: 600; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 5px; color: var(--text-muted); }
        .form-control { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; outline: none; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }
        .btn-cancel { padding: 10px 20px; background: #E5E7EB; color: var(--text-main); border: none; border-radius: 8px; cursor: pointer; font-weight: 500;}
        .btn-save { padding: 10px 20px; background: var(--info); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 500;}

        /* Mobile Optimization */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .header { padding: 20px 15px; flex-direction: column; align-items: stretch; gap: 15px; }
            .header h1 { font-size: 20px; text-align: center; }
            .header-actions { flex-direction: column; align-items: stretch; width: 100%; }
            .input-group { justify-content: space-between; }
            .input-group input { text-align: right; }
            .btn-export { justify-content: center; width: 100%; }
            .content { padding: 0 15px 15px; }
            th, td { padding: 10px; font-size: 13px; }
            .btn-sm { padding: 5px 8px; font-size: 12px; margin-bottom: 3px; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" id="tab-pending" onclick="switchTab('pending')">대기중 주문</button>
            <button class="tab-btn" id="tab-exported" onclick="switchTab('exported')">발송 완료 내역</button>
        </div>
        <div class="header">
            <h1 id="header-title" style="display: flex; align-items: center; gap: 10px;">
                <svg onclick="openSettingsModal()" style="cursor:pointer; color:#6B7280; transition:0.2s;" onmouseover="this.style.color='#111827'" onmouseout="this.style.color='#6B7280'" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                오늘의 주문 (대기중)
            </h1>
            <div class="header-actions">
                <div class="input-group">
                    <label>몰명 설정</label>
                    <input type="text" id="mallNameInput" value="현대백화점 대구점" placeholder="몰명 입력">
                </div>
                <button class="btn-export" id="exportBtn" onclick="exportAndSend()">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    마감 및 메일 전송
                </button>
            </div>
        </div>
        <div class="content">
            <table>
                <thead>
                    <tr>
                        <th>주문번호</th>
                        <th>고객명</th>
                        <th>연락처</th>
                        <th>주소</th>
                        <th>접수시간</th>
                        <th>상태</th>
                        <th id="th-action">관리</th>
                    </tr>
                </thead>
                <tbody id="orderTableBody">
                    <!-- Orders will be loaded here -->
                </tbody>
            </table>
            <div id="emptyState" class="empty-state" style="display: none;">
                발송 대기중인 주문이 없습니다.
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">주문 정보 수정</div>
            <input type="hidden" id="editOrderId">
            <div class="form-group">
                <label>고객명</label>
                <input type="text" id="editName" class="form-control">
            </div>
            <div class="form-group">
                <label>연락처</label>
                <input type="text" id="editContact" class="form-control">
            </div>
            <div class="form-group">
                <label>주소</label>
                <input type="text" id="editAddress" class="form-control">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">취소</button>
                <button class="btn-save" onclick="saveOrder()">저장</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal" style="z-index: 200;">
        <div class="modal-content" style="max-width: 600px; text-align: left;">
            <div class="modal-header">이메일 발송 설정</div>
            
            <div style="background: #F9FAFB; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                <h3 style="font-size: 15px; margin-bottom: 10px; color: var(--primary);">발신자 정보 (보내는 사람)</h3>
                <div class="form-group">
                    <label>판매자 성함 (또는 팀명)</label>
                    <input type="text" id="setSenderName" class="form-control" placeholder="예: 영업1팀 박윤창">
                </div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;">
                        <label>발송 이메일 (Gmail)</label>
                        <input type="email" id="setSenderEmail" class="form-control" placeholder="example@gmail.com">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>앱 비밀번호 (16자리)</label>
                        <input type="password" id="setSenderPassword" class="form-control" placeholder="띄어쓰기 없이 입력">
                    </div>
                </div>
            </div>

            <div style="background: #F9FAFB; padding: 15px; border-radius: 8px;">
                <h3 style="font-size: 15px; margin-bottom: 10px; color: var(--info);">수신자 정보 (받는 사람)</h3>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;">
                        <label>물류 담당자 성함</label>
                        <input type="text" id="setReceiverName" class="form-control" placeholder="예: 물류팀 김철수">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>수신 이메일</label>
                        <input type="email" id="setReceiverEmail" class="form-control" placeholder="receiver@wechik.com">
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;">
                        <label>참조자 성함 (선택)</label>
                        <input type="text" id="setCcName" class="form-control" placeholder="예: 영업팀장">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>참조 이메일 (선택)</label>
                        <input type="email" id="setCcEmail" class="form-control" placeholder="cc@wechik.com">
                    </div>
                </div>
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeSettingsModal()">취소</button>
                <button class="btn-save" onclick="saveSettings()">저장</button>
            </div>
        </div>
    </div>

    <script>
        let currentOrders = [];
        let currentTab = 'pending';

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            loadOrders();
        }

        async function loadSettings() {
            try {
                const res = await fetch('/api/admin/settings');
                const data = await res.json();
                if(data) {
                    document.getElementById('setSenderName').value = data.sender_name || '';
                    document.getElementById('setSenderEmail').value = data.sender_email || '';
                    document.getElementById('setSenderPassword').value = data.sender_password || '';
                    document.getElementById('setReceiverName').value = data.receiver_name || '';
                    document.getElementById('setReceiverEmail').value = data.receiver_email || '';
                    document.getElementById('setCcName').value = data.cc_name || '';
                    document.getElementById('setCcEmail').value = data.cc_email || '';
                }
            } catch (e) {
                console.error("Failed to load settings", e);
            }
        }

        function openSettingsModal() {
            document.getElementById('settingsModal').style.display = 'flex';
        }

        function closeSettingsModal() {
            document.getElementById('settingsModal').style.display = 'none';
        }

        async function saveSettings() {
            const payload = {
                sender_name: document.getElementById('setSenderName').value.trim(),
                sender_email: document.getElementById('setSenderEmail').value.trim(),
                sender_password: document.getElementById('setSenderPassword').value.trim(),
                receiver_name: document.getElementById('setReceiverName').value.trim(),
                receiver_email: document.getElementById('setReceiverEmail').value.trim(),
                cc_name: document.getElementById('setCcName').value.trim(),
                cc_email: document.getElementById('setCcEmail').value.trim()
            };

            try {
                const res = await fetch('/api/admin/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    alert("설정이 저장되었습니다.");
                    closeSettingsModal();
                } else {
                    alert("설정 저장에 실패했습니다.");
                }
            } catch (e) {
                alert("네트워크 오류가 발생했습니다.");
            }
        }

        async function loadOrders() {
            try {
                const res = await fetch(`/api/admin/orders?status=${currentTab}`);
                currentOrders = await res.json();
                
                const tbody = document.getElementById('orderTableBody');
                const emptyState = document.getElementById('emptyState');
                const exportBtn = document.getElementById('exportBtn');
                const thAction = document.getElementById('th-action');
                
                tbody.innerHTML = '';
                
                if (currentTab === 'pending') {
                    exportBtn.style.display = 'flex';
                    thAction.style.display = 'table-cell';
                    emptyState.innerText = "발송 대기중인 주문이 없습니다.";
                    document.getElementById('header-title').innerHTML = `
                        <svg onclick="openSettingsModal()" style="cursor:pointer; color:#6B7280; transition:0.2s;" onmouseover="this.style.color='#111827'" onmouseout="this.style.color='#6B7280'" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        오늘의 주문 (대기중)
                    `;
                } else {
                    exportBtn.style.display = 'none';
                    thAction.style.display = 'none';
                    emptyState.innerText = "마감 완료된 주문이 없습니다.";
                    document.getElementById('header-title').innerHTML = `
                        <svg onclick="openSettingsModal()" style="cursor:pointer; color:#6B7280; transition:0.2s;" onmouseover="this.style.color='#111827'" onmouseout="this.style.color='#6B7280'" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        발송 완료 내역
                    `;
                }

                if (currentOrders.length === 0) {
                    emptyState.style.display = 'block';
                    if(currentTab === 'pending') exportBtn.disabled = true;
                } else {
                    emptyState.style.display = 'none';
                    if(currentTab === 'pending') exportBtn.disabled = false;
                    
                    currentOrders.forEach(o => {
                        const date = new Date(o.created_at).toLocaleTimeString('ko-KR', { hour: '2-digit', minute:'2-digit' });
                        
                        let actionTd = '';
                        let statusBadge = '';
                        
                        if (currentTab === 'pending') {
                            statusBadge = `<span class="status-badge">대기중</span>`;
                            actionTd = `
                                <td>
                                    <button class="btn-sm btn-edit" onclick="openEditModal(${o.id})">수정</button>
                                    <button class="btn-sm btn-delete" onclick="deleteOrder(${o.id})">삭제</button>
                                </td>
                            `;
                        } else {
                            statusBadge = `<span class="status-badge" style="background:#D1FAE5; color:#065F46;">마감완료</span>`;
                            actionTd = ``;
                        }

                        tbody.innerHTML += `
                            <tr>
                                <td><span style="font-family: monospace; color: #6B7280;">${o.order_no}</span></td>
                                <td style="font-weight: 500;">${o.customer_name}</td>
                                <td>${o.contact}</td>
                                <td><div style="max-width:250px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${o.address}">${o.address}</div></td>
                                <td>${date}</td>
                                <td>${statusBadge}</td>
                                ${actionTd}
                            </tr>
                        `;
                    });
                }
            } catch (e) {
                console.error(e);
                alert("주문 목록을 불러오는데 실패했습니다.");
            }
        }

        async function exportAndSend() {
            const mallName = document.getElementById('mallNameInput').value.trim();
            if (!mallName) {
                alert("몰명을 입력해주세요.");
                return;
            }
            if (!confirm(`몰명 [${mallName}] (으)로 대기중인 모든 주문을 마감하고 메일을 전송하시겠습니까?`)) return;
            
            const btn = document.getElementById('exportBtn');
            btn.innerHTML = "처리중...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/admin/export', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mall_name: mallName })
                });
                const result = await res.json();
                
                if (res.ok && result.status === 'success') {
                    alert("성공적으로 마감 및 전송되었습니다.");
                    loadOrders(); // reload
                } else {
                    alert("오류: " + result.message);
                }
            } catch (e) {
                alert("네트워크 오류가 발생했습니다.");
            } finally {
                btn.innerHTML = `
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    마감 및 메일 전송
                `;
                btn.disabled = false;
            }
        }

        function openEditModal(id) {
            const order = currentOrders.find(o => o.id === id);
            if (!order) return;
            document.getElementById('editOrderId').value = id;
            document.getElementById('editName').value = order.customer_name;
            document.getElementById('editContact').value = order.contact;
            document.getElementById('editAddress').value = order.address;
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        async function saveOrder() {
            const id = document.getElementById('editOrderId').value;
            const payload = {
                customer_name: document.getElementById('editName').value.trim(),
                contact: document.getElementById('editContact').value.trim(),
                address: document.getElementById('editAddress').value.trim()
            };

            if (!payload.customer_name || !payload.contact || !payload.address) {
                alert("모든 필드를 입력해주세요.");
                return;
            }

            try {
                const res = await fetch(`/api/admin/orders/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    closeModal();
                    loadOrders();
                } else {
                    alert("수정에 실패했습니다.");
                }
            } catch (e) {
                alert("네트워크 오류가 발생했습니다.");
            }
        }

        async function deleteOrder(id) {
            if (!confirm("정말 이 주문을 삭제하시겠습니까?")) return;
            try {
                const res = await fetch(`/api/admin/orders/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    loadOrders();
                } else {
                    alert("삭제에 실패했습니다.");
                }
            } catch (e) {
                alert("네트워크 오류가 발생했습니다.");
            }
        }

        window.onload = () => {
            loadOrders();
            loadSettings();
        };
    </script>
</body>
</html>
