<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wechik - 간편 주문 시스템</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); line-height: 1.5; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: var(--card-bg); border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; }
        .header { background: linear-gradient(135deg, #4F46E5, #7C3AED); padding: 40px 20px; text-align: center; color: white; }
        .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 10px; }
        .header p { font-size: 16px; opacity: 0.9; }
        .content { padding: 40px 30px; }
        .section-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; color: var(--text-main); display: flex; align-items: center; }
        .section-title::before { content: ''; display: inline-block; width: 4px; height: 20px; background: var(--primary); margin-right: 10px; border-radius: 2px; }
        
        .product-list { display: flex; flex-direction: column; gap: 15px; margin-bottom: 40px; }
        .product-card { display: flex; justify-content: space-between; align-items: center; padding: 20px; border: 1px solid var(--border); border-radius: 12px; transition: all 0.2s; }
        .product-card:hover { border-color: var(--primary); box-shadow: 0 4px 12px rgba(79,70,229,0.1); }
        .product-info h3 { font-size: 16px; font-weight: 500; margin-bottom: 5px; }
        .qty-control { display: flex; align-items: center; gap: 15px; background: #F9FAFB; padding: 5px; border-radius: 30px; }
        .qty-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: white; color: var(--text-main); font-size: 18px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .qty-btn:active { transform: scale(0.95); }
        .qty-btn:hover { color: var(--primary); }
        .qty-value { font-weight: 600; width: 20px; text-align: center; font-size: 18px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 8px; color: var(--text-muted); }
        .form-control { width: 100%; padding: 15px; border: 1px solid var(--border); border-radius: 10px; font-size: 16px; outline: none; transition: 0.2s; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }
        
        .address-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-search { white-space: nowrap; padding: 0 20px; background: #E5E7EB; border: none; border-radius: 10px; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .btn-search:hover { background: #D1D5DB; }

        .submit-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #4F46E5, #7C3AED); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer; margin-top: 30px; box-shadow: 0 10px 20px rgba(79,70,229,0.2); transition: 0.3s; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(79,70,229,0.3); }
        .submit-btn:active { transform: translateY(0); }

        /* Loader & Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 40px; border-radius: 20px; text-align: center; max-width: 400px; width: 90%; animation: popIn 0.3s ease-out; }
        .modal-icon { font-size: 48px; margin-bottom: 20px; color: #10B981; }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Mobile Optimization */
        @media (max-width: 600px) {
            body { padding: 10px; }
            .content { padding: 25px 20px; }
            .header { padding: 30px 15px; }
            .header h1 { font-size: 24px; }
            .header p { font-size: 14px; }
            .product-card { padding: 15px; flex-direction: column; align-items: flex-start; gap: 15px; }
            .qty-control { width: 100%; justify-content: space-between; }
        }
    </style>
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Wechik 간편 주문</h1>
            <p>원하시는 상품을 선택하고 배송지를 입력해주세요.</p>
        </div>
        <div class="content">
            <h2 class="section-title">상품 선택</h2>
            <div class="product-list" id="productList">
                <!-- Products will be loaded here -->
                <div style="text-align:center; padding: 20px; color:#6B7280;">상품을 불러오는 중입니다...</div>
            </div>

            <h2 class="section-title" style="margin-top: 50px;">배송지 정보</h2>
            <div class="form-group">
                <label>받으시는 분 성함</label>
                <input type="text" id="customerName" class="form-control" placeholder="이름을 입력해주세요">
            </div>
            <div class="form-group">
                <label>연락처</label>
                <input type="tel" id="contact" class="form-control" placeholder="010-0000-0000" maxlength="13">
            </div>
            <div class="form-group">
                <label>배송지 주소</label>
                <div class="address-group">
                    <input type="text" id="postcode" class="form-control" placeholder="우편번호" readonly>
                    <button type="button" class="btn-search" onclick="execDaumPostcode()">주소 검색</button>
                </div>
                <input type="text" id="address1" class="form-control" placeholder="기본 주소" readonly style="margin-bottom:10px; background:#F9FAFB;">
                <input type="text" id="address2" class="form-control" placeholder="상세 주소를 입력해주세요">
            </div>
            <div class="form-group">
                <label>배송 요청사항 (선택)</label>
                <input type="text" id="memo" class="form-control" placeholder="예: 문 앞에 놓아주세요">
            </div>

            <button class="submit-btn" onclick="submitOrder()">주문 완료하기</button>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal" id="successModal">
        <div class="modal-content">
            <div class="modal-icon">✨</div>
            <h2 style="margin-bottom:10px;">주문이 완료되었습니다!</h2>
            <p style="color:#6B7280; margin-bottom:20px;">입력하신 주소로 안전하게 배송해드리겠습니다.</p>
            <button class="btn-search" style="width:100%; padding:15px; background:var(--primary); color:white;" onclick="resetForm()">처음으로 돌아가기</button>
        </div>
    </div>

    <script>
        let products = [];
        let orderItems = {};

        // Contact Number Auto Formatting
        document.getElementById('contact').addEventListener('input', function (e) {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,4})(\d{0,4})/);
            e.target.value = !x[2] ? x[1] : x[1] + '-' + x[2] + (x[3] ? '-' + x[3] : '');
        });

        async function loadProducts() {
            try {
                const res = await fetch('/api/products');
                products = await res.json();
                renderProducts();
            } catch (e) {
                console.error(e);
                document.getElementById('productList').innerHTML = '<div style="color:red; text-align:center;">상품을 불러오는데 실패했습니다.</div>';
            }
        }

        function renderProducts() {
            const list = document.getElementById('productList');
            list.innerHTML = '';
            products.forEach(p => {
                orderItems[p.id] = 0;
                list.innerHTML += `
                    <div class="product-card">
                        <div class="product-info">
                            <h3>${p.name}</h3>
                        </div>
                        <div class="qty-control">
                            <button class="qty-btn" onclick="updateQty(${p.id}, -1)">-</button>
                            <span class="qty-value" id="qty-${p.id}">0</span>
                            <button class="qty-btn" onclick="updateQty(${p.id}, 1)">+</button>
                        </div>
                    </div>
                `;
            });
        }

        function updateQty(id, change) {
            let newVal = orderItems[id] + change;
            if (newVal < 0) newVal = 0;
            if (newVal > 99) newVal = 99;
            orderItems[id] = newVal;
            document.getElementById(`qty-${id}`).innerText = newVal;
        }

        function execDaumPostcode() {
            new daum.Postcode({
                oncomplete: function(data) {
                    document.getElementById('postcode').value = data.zonecode;
                    document.getElementById('address1').value = data.address;
                    document.getElementById('address2').focus();
                }
            }).open();
        }

        async function submitOrder() {
            const name = document.getElementById('customerName').value.trim();
            const contact = document.getElementById('contact').value.trim();
            const addr1 = document.getElementById('address1').value.trim();
            const addr2 = document.getElementById('address2').value.trim();
            const memo = document.getElementById('memo').value.trim();

            const items = Object.entries(orderItems)
                .filter(([_, qty]) => qty > 0)
                .map(([id, qty]) => ({ product_id: parseInt(id), quantity: qty }));

            if (items.length === 0) {
                alert("최소 1개 이상의 상품을 선택해주세요.");
                return;
            }
            if (!name || !contact || !addr1) {
                alert("배송지 정보를 모두 입력해주세요.");
                return;
            }

            const payload = {
                customer_name: name,
                contact: contact,
                address: `(${document.getElementById('postcode').value}) ${addr1} ${addr2}`,
                memo: memo,
                items: items
            };

            const btn = document.querySelector('.submit-btn');
            btn.innerText = "처리중...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    document.getElementById('successModal').style.display = 'flex';
                } else {
                    alert("주문 처리 중 오류가 발생했습니다.");
                }
            } catch (e) {
                alert("네트워크 오류가 발생했습니다.");
            } finally {
                btn.innerText = "주문 완료하기";
                btn.disabled = false;
            }
        }

        function resetForm() {
            document.getElementById('customerName').value = '';
            document.getElementById('contact').value = '';
            document.getElementById('postcode').value = '';
            document.getElementById('address1').value = '';
            document.getElementById('address2').value = '';
            document.getElementById('memo').value = '';
            
            Object.keys(orderItems).forEach(id => {
                orderItems[id] = 0;
                document.getElementById(`qty-${id}`).innerText = 0;
            });
            
            document.getElementById('successModal').style.display = 'none';
            window.scrollTo(0,0);
        }

        window.onload = loadProducts;
    </script>
</body>
</html>
